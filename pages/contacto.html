<section
    id="contacto"
    class="contact-section">

    <div class="container">

        <div class="row align-items-center gy-5">

            <!-- INFORMACIÓN -->

            <div class="col-lg-5">

                <span class="section-tag">

                    CONTACTO

                </span>

                <h2>

                    Construyamos juntos el futuro

                    <span>

                        HealthTech

                    </span>

                </h2>

                <p>

                    ¿Tienes un proyecto de software para salud?
                    Estaré encantada de colaborar.

                </p>

                <div class="contact-info">

                    <div class="contact-item">

                        <i class="bi bi-envelope-fill"></i>

                        <div>

                            <small>

                                Email

                            </small>

                            <h4>

                                contacto@syntesch.com

                            </h4>

                        </div>

                    </div>

                    <div class="contact-item">

                        <i class="bi bi-linkedin"></i>

                        <div>

                            <small>

                                LinkedIn

                            </small>

                            <h4>

                                /luciacantillo

                            </h4>

                        </div>

                    </div>

                </div>

            </div>

            <!-- FORMULARIO -->

            <div class="col-lg-7">

                <form class="contact-form">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <input
                                type="text"
                                placeholder="Nombre">

                        </div>

                        <div class="col-md-6">

                            <input
                                type="email"
                                placeholder="Correo">

                        </div>

                        <div class="col-12">

                            <input
                                type="text"
                                placeholder="Empresa">

                        </div>

                        <div class="col-12">

                            <textarea
                                rows="5"
                                placeholder="Describe tu proyecto..."></textarea>

                        </div>

                        <div class="col-12">

                            <button
                                type="submit"
                                class="btn-primary-syntesch">

                                Enviar mensaje

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>
